<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Где я?</title>
 <style>
 body {
 font-family: monospace;
 background-color: #1a1a1a;
 color: #00ff00; /* Хакерский зеленый, куда ж без него */
 display: flex;
 justify-content: center;
 align-items: center;
 height: 100vh;
 margin: 0;
 text-align: center;
 }
 .container {
 border: 2px solid #00ff00;
 padding: 2rem;
 border-radius: 8px;
 box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
}
 h1 {
 font-size: 1.2rem;
 margin-bottom: 1rem;
 color: #ccc;
 }
 #ip-address {
 font-size: 2rem;
 font-weight: bold;
 }
 .loading {
 color: #ffff00;
 }
 .error {
 color: #ff0000;
 }
 </style>
</head>
<body>
 <div class="container">
 <h1>You IP:</h1>
 <div id="ip-address" class="loading">Загрузка...</div>
<script>
 // Используем api.ipify.org — он простой, быстрый и отдает чистый JSON или текст.
 // ?format=json нужно, чтобы легче парсить.
 fetch('https://api.ipify.org?format=json')
 .then(response => {
 if (!response.ok) {
 throw new Error('Сеть ответила ошибкой');
 }
 return response.json();
 })
 .then(data => {
 const ipElement = document.getElementById('ip-address');
 ipElement.textContent = data.ip;
 ipElement.classList.remove('loading');

 // Бонус: выводим в консоль для проверки
 console.log('Current IP:', data.ip);
 })
 .catch(error => {
 const ipElement = document.getElementById('ip-address');
 ipElement.textContent = 'Ошибка получения IP';
 ipElement.classList.add('error');
 console.error('Ошибка:', error);
});
 </script>
</body>
</html>
